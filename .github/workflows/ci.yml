name: Verify And Publish

on:
  workflow_dispatch:
    inputs:
      publish_to_npm:
        description: "Publish to npm after verify"
        required: true
        default: false
        type: boolean

jobs:
  verify:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build library
        run: npm run build

      - name: Build demo
        run: npm run build:demo

      - name: Publish to npm
        if: ${{ inputs.publish_to_npm }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
